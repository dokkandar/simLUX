<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AutoRasm · Swappable Palette + Save Mapping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #eef2f5;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 1.5rem;
            max-width: 1100px;
            width: fit-content;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3a4b, #1e4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            font-size: 0.8rem;
            color: #4a627a;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 5px;
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        canvas {
            background: #fef9ef;
            border-radius: 50%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            height: auto;
            cursor: crosshair;
            display: block;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
        }

        button, .mode-btn {
            background: #2c5a7a;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover, .mode-btn.active {
            background: #1e3e58;
            transform: scale(0.97);
        }

        .mode-btn.active {
            background: #f5a623;
            color: #1f2e3a;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #f5a623;
        }

        .info-panel {
            margin-top: 1rem;
            background: #f8fafc;
            border-radius: 40px;
            padding: 12px 24px;
            display: inline-flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            font-family: monospace;
        }

        .info-item {
            background: white;
            padding: 4px 16px;
            border-radius: 40px;
        }

        .mapping-area {
            margin-top: 1rem;
            background: #1e2a36;
            border-radius: 32px;
            padding: 16px;
            text-align: left;
        }

        .mapping-area label {
            color: #cbd5e6;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        textarea {
            width: 100%;
            background: #0f1720;
            color: #b9e6ff;
            border: 1px solid #2d4a6e;
            border-radius: 24px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.75rem;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .copy-btn, .save-btn {
            flex: 1;
            background: #2c7a4d;
        }

        .save-btn {
            background: #2c5a7a;
        }

        .status {
            font-size: 0.75rem;
            margin-top: 6px;
            color: #f5b042;
        }

        footer {
            font-size: 0.7rem;
            color: #6b85a0;
            margin-top: 1rem;
            border-top: 1px solid #e2edf2;
            padding-top: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>AutoRasm . Swappable Palette + Save</h1>
    <div class="sub">Swap colors -> Save mapping as JSON -> Paste here for final HTML</div>

    <div class="canvas-wrapper">
        <canvas id="polarCanvas" width="800" height="800" style="width:100%; max-width:800px; aspect-ratio:1/1"></canvas>
    </div>

    <div class="controls">
        <button id="swapModeBtn" class="mode-btn">Swap mode OFF</button>
        <button id="resetMappingBtn">Reset to original</button>
    </div>

    <div class="info-panel">
        <div class="info-item">Hover ACI: <strong id="hoverAci">-</strong></div>
        <div class="info-item">RGB: <strong id="hoverRgb">-</strong></div>
        <div class="info-item">Selected: <strong id="selectedIdx">none</strong></div>
    </div>

    <div class="mapping-area">
        <label>CURRENT COLOR MAPPING (copy or save as JSON)</label>
        <textarea id="mappingOutput" rows="4" readonly></textarea>
        <div class="button-group">
            <button id="copyMappingBtn" class="copy-btn">Copy to clipboard</button>
            <button id="saveMappingBtn" class="save-btn">Save mapping as file</button>
        </div>
        <div class="status" id="copyStatus"></div>
    </div>
    <footer>Click two circles in swap mode to swap colors. Save -> download .json. Later you can paste that array here to get final HTML.</footer>
</div>

<script>
    // ---------- FULL ACI COLOR TABLE (0..255) ----------
    const aciColors = [
        [0,0,0],       [255,0,0],     [255,255,0],   [0,255,0],     [0,255,255],   [0,0,255],     [255,0,255],   [255,255,255],
        [128,128,128], [192,192,192], [255,0,0],     [255,127,127], [165,0,0],     [165,82,82],   [127,0,0],     [127,63,63],
        [76,0,0],      [76,38,38],    [38,0,0],      [38,19,19],    [255,63,0],    [255,159,127], [165,41,0],    [165,103,82],
        [127,31,0],    [127,79,63],   [76,19,0],     [76,47,38],    [38,9,0],      [38,23,19],    [255,127,0],   [255,191,127],
        [165,82,0],    [165,124,82],  [127,63,0],    [127,95,63],   [76,38,0],     [76,57,38],    [38,19,0],     [38,28,19],
        [255,191,0],   [255,223,127], [165,124,0],   [165,145,82],  [127,95,0],    [127,111,63],  [76,57,0],     [76,66,38],
        [38,28,0],     [38,33,19],    [255,255,0],   [255,255,127], [165,165,0],   [165,165,82],  [127,127,0],   [127,127,63],
        [76,76,0],     [76,76,38],    [38,38,0],     [38,38,19],    [191,255,0],   [223,255,127], [124,165,0],   [145,165,82],
        [95,127,0],    [111,127,63],  [57,76,0],     [66,76,38],    [28,38,0],     [33,38,19],    [127,255,0],   [191,255,127],
        [82,165,0],    [124,165,82],  [63,127,0],    [95,127,63],   [38,76,0],     [57,76,38],    [19,38,0],     [28,38,19],
        [63,255,0],    [159,255,127], [41,165,0],    [103,165,82],  [31,127,0],    [79,127,63],   [19,76,0],     [47,76,38],
        [9,38,0],      [23,38,19],    [0,255,0],     [127,255,127], [0,165,0],     [82,165,82],   [0,127,0],     [63,127,63],
        [0,76,0],      [38,76,38],    [0,38,0],      [19,38,19],    [0,255,63],    [127,255,159], [0,165,41],    [82,165,103],
        [0,127,31],    [63,127,79],   [0,76,19],     [38,76,47],    [0,38,9],      [19,38,23],    [0,255,127],   [127,255,191],
        [0,165,82],    [82,165,124],  [0,127,63],    [63,127,95],   [0,76,38],     [38,76,57],    [0,38,19],     [19,38,28],
        [0,255,191],   [127,255,223], [0,165,124],   [82,165,145],  [0,127,95],    [63,127,111],  [0,76,57],     [38,76,66],
        [0,38,28],     [19,38,33],    [0,255,255],   [127,255,255], [0,165,165],   [82,165,165],  [0,127,127],   [63,127,127],
        [0,76,76],     [38,76,76],    [0,38,38],     [19,38,38],    [0,191,255],   [127,223,255], [0,124,165],   [82,145,165],
        [0,95,127],    [63,111,127],  [0,57,76],     [38,66,76],    [0,28,38],     [19,33,38],    [0,127,255],   [127,191,255],
        [0,82,165],    [82,124,165],  [0,63,127],    [63,95,127],   [0,38,76],     [38,57,76],    [0,19,38],     [19,28,38],
        [0,63,255],    [127,159,255], [0,41,165],    [82,103,165],  [0,31,127],    [63,79,127],   [0,19,76],     [38,47,76],
        [0,9,38],      [19,23,38],    [0,0,255],     [127,127,255], [0,0,165],     [82,82,165],   [0,0,127],     [63,63,127],
        [0,0,76],      [38,38,76],    [0,0,38],      [19,19,38],    [63,0,255],    [159,127,255], [41,0,165],    [103,82,165],
        [31,0,127],    [79,63,127],   [19,0,76],     [47,38,76],    [9,0,38],      [23,19,38],    [127,0,255],   [191,127,255],
        [82,0,165],    [124,82,165],  [63,0,127],    [95,63,127],   [38,0,76],     [57,38,76],    [19,0,38],     [28,19,38],
        [191,0,255],   [223,127,255], [124,0,165],   [145,82,165],  [95,0,127],    [111,63,127],  [57,0,76],     [66,38,76],
        [28,0,38],     [33,19,38],    [255,0,255],   [255,127,255], [165,0,165],   [165,82,165],  [127,0,127],   [127,63,127],
        [76,0,76],     [76,38,76],    [38,0,38],     [38,19,38],    [255,0,191],   [255,127,223], [165,0,124],   [165,82,145],
        [127,0,95],    [127,63,111],  [76,0,57],     [76,38,66],    [38,0,28],     [38,19,33],    [255,0,127],   [255,127,191],
        [165,0,82],    [165,82,124],  [127,0,63],    [127,63,95],   [76,0,38],     [76,38,57],    [38,0,19],     [38,19,28],
        [255,0,63],    [255,127,159], [165,0,41],    [165,82,103],  [127,0,31],    [127,63,79],   [76,0,19],     [76,38,47],
        [38,0,9],      [38,19,23],    [84,84,84],    [118,118,118], [152,152,152], [186,186,186], [220,220,220], [255,255,255]
    ];

    function rgbToHex(r,g,b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }
    function luminance(rgb) { return 0.299 * rgb[0] + 0.587 * rgb[1] + 0.114 * rgb[2]; }

    // ----- original angle mapping (for initial layout) -----
    const hueMap = [
        { h: 0,   a: 0 }, { h: 30,  a: 315 }, { h: 60,  a: 240 }, { h: 90,  a: 210 },
        { h: 120, a: 180 }, { h: 180, a: 150 }, { h: 240, a: 120 }, { h: 260, a: 100 },
        { h: 280, a: 80 }, { h: 300, a: 45 }, { h: 360, a: 0 }
    ];
    function getIdealAngle(rgb) {
        let r=rgb[0], g=rgb[1], b=rgb[2], max=Math.max(r,g,b), min=Math.min(r,g,b);
        let l=(max+min)/2, d=max-min, s=max===0?0:d/max;
        if(s<0.12) return l>160 ? 270 : 90;
        let h=0;
        if(max!==min){
            if(max===r) h=(g-b)/d+(g<b?6:0);
            else if(max===g) h=(b-r)/d+2;
            else h=(r-g)/d+4;
            h/=6;
        }
        h*=360;
        for(let i=0;i<hueMap.length-1;i++){
            if(h>=hueMap[i].h && h<=hueMap[i+1].h){
                let t=(h-hueMap[i].h)/(hueMap[i+1].h-hueMap[i].h);
                let a1=hueMap[i].a, a2=hueMap[i+1].a;
                if(a1===0 && a2===315) a1=360;
                let a=a1+t*(a2-a1);
                return a%360;
            }
        }
        return 0;
    }
    function angleDiff(a,b){ let d=Math.abs(a-b)%360; return d>180?360-d:d; }

    // ----- compute default layout (ACI order sorted by luminance, then angle) -----
    let sortedIndices = [...Array(256).keys()];
    sortedIndices.sort((a,b)=>luminance(aciColors[b])-luminance(aciColors[a]));
    const centerIndex = sortedIndices.shift();

    const CIRCLE_RADIUS = 16, RADIAL_GAP=4, TANGENTIAL_GAP=4, DIAMETER=CIRCLE_RADIUS*2;
    const RADIAL_STEP=DIAMETER+RADIAL_GAP, FIRST_RING_RADIUS=DIAMETER+RADIAL_GAP;

    function computeRings(){
        let rings=[], remaining=255, ringIndex=0;
        while(remaining>0){
            let radius=FIRST_RING_RADIUS+ringIndex*RADIAL_STEP;
            let circumference=2*Math.PI*radius;
            let maxCount=Math.floor(circumference/(DIAMETER+TANGENTIAL_GAP));
            let count=Math.min(maxCount, remaining);
            if(count<1) count=1;
            rings.push({radius, count});
            remaining-=count;
            ringIndex++;
            if(ringIndex>30) break;
        }
        return rings;
    }
    const rings = computeRings();

    // ----- generate initial positions and original color indices (order: center then rings)-----
    let circlePositions = []; // {x, y, radius, ringIdx, angleIdx}
    let originalColorIndices = []; // ACI index for each position in order
    const canvas = document.getElementById('polarCanvas');
    const ctx = canvas.getContext('2d');

    function buildPositionsAndOriginalMapping() {
        const w=canvas.width, h=canvas.height, cx=w/2, cy=h/2;
        let positions = [];
        let origColors = [];

        // center
        positions.push({ x:cx, y:cy, radius:CIRCLE_RADIUS, ringIdx:0, angleIdx:0 });
        origColors.push(centerIndex);

        let remainingIndices = [...sortedIndices];
        for(let ringIdx=0; ringIdx<rings.length; ringIdx++){
            let ring = rings[ringIdx];
            let chunk = remainingIndices.splice(0, ring.count);
            if(chunk.length===0) break;
            let colorData = chunk.map(idx => ({ idx, ideal: getIdealAngle(aciColors[idx]) }));
            colorData.sort((a,b)=>a.ideal-b.ideal);
            let slots=[], angleStep=360/ring.count;
            for(let i=0;i<ring.count;i++) slots.push(i*angleStep);
            let assigned = new Array(ring.count);
            if(chunk.length===ring.count){
                let bestOffset=0, minError=Infinity;
                for(let off=0; off<ring.count; off++){
                    let err=0;
                    for(let i=0;i<ring.count;i++) err += angleDiff(colorData[i].ideal, slots[(i+off)%ring.count]);
                    if(err<minError){ minError=err; bestOffset=off; }
                }
                for(let i=0;i<ring.count;i++) assigned[i] = slots[(i+bestOffset)%ring.count];
            } else {
                let available = [...slots];
                for(let i=0;i<chunk.length;i++){
                    let bestIdx=0, bestDiff=Infinity;
                    for(let j=0;j<available.length;j++){
                        let diff=angleDiff(colorData[i].ideal, available[j]);
                        if(diff<bestDiff){ bestDiff=diff; bestIdx=j; }
                    }
                    assigned[i]=available[bestIdx];
                    available.splice(bestIdx,1);
                }
            }
            for(let i=0;i<chunk.length;i++){
                let angleRad = assigned[i] * Math.PI/180;
                let x = cx + ring.radius * Math.cos(angleRad);
                let y = cy + ring.radius * Math.sin(angleRad);
                positions.push({ x, y, radius:CIRCLE_RADIUS, ringIdx:ringIdx+1, angleIdx:i });
                origColors.push(colorData[i].idx);
            }
        }
        return { positions, origColors };
    }

    let { positions, origColors } = buildPositionsAndOriginalMapping();
    let currentMapping = [...origColors];  // ACI index for each circle position
    let swapMode = false;
    let selectedCircleIdx = null;

    // draw using currentMapping
    function drawFromMapping() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save();
        for(let i=0; i<positions.length; i++){
            let p = positions[i];
            let aci = currentMapping[i];
            let rgb = aciColors[aci];
            let hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            ctx.fillStyle = hex;
            ctx.fill();
            ctx.strokeStyle = "#c0cfdf";
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        // draw highlight for selected
        if(swapMode && selectedCircleIdx !== null && selectedCircleIdx < positions.length){
            let p = positions[selectedCircleIdx];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius+5, 0, Math.PI*2);
            ctx.strokeStyle = "#ffaa33";
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        ctx.restore();
        updateMappingTextarea();
    }

    function updateMappingTextarea() {
        document.getElementById('mappingOutput').value = JSON.stringify(currentMapping);
    }

    function resetToOriginal() {
        currentMapping = [...origColors];
        selectedCircleIdx = null;
        drawFromMapping();
        document.getElementById('selectedIdx').innerText = 'none';
    }

    // swap two circles in mapping
    function swapCircles(idxA, idxB) {
        if(idxA === idxB) return;
        let temp = currentMapping[idxA];
        currentMapping[idxA] = currentMapping[idxB];
        currentMapping[idxB] = temp;
        drawFromMapping();
    }

    // hover info
    function handleHover(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        let foundIdx = -1;
        for(let i=0; i<positions.length; i++){
            let p = positions[i];
            if(Math.hypot(mouseX-p.x, mouseY-p.y) <= p.radius){
                foundIdx = i;
                break;
            }
        }
        if(foundIdx !== -1){
            let aci = currentMapping[foundIdx];
            let rgb = aciColors[aci];
            document.getElementById('hoverAci').innerText = aci;
            document.getElementById('hoverRgb').innerText = `${rgb[0]},${rgb[1]},${rgb[2]}`;
            canvas.style.cursor = 'pointer';
        } else {
            document.getElementById('hoverAci').innerText = '-';
            document.getElementById('hoverRgb').innerText = '-';
            canvas.style.cursor = 'crosshair';
        }
    }

    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        let clickedIdx = -1;
        for(let i=0; i<positions.length; i++){
            let p = positions[i];
            if(Math.hypot(mouseX-p.x, mouseY-p.y) <= p.radius){
                clickedIdx = i;
                break;
            }
        }
        if(clickedIdx === -1) return;

        if(swapMode){
            if(selectedCircleIdx === null){
                selectedCircleIdx = clickedIdx;
                document.getElementById('selectedIdx').innerText = selectedCircleIdx;
                drawFromMapping();
            } else {
                swapCircles(selectedCircleIdx, clickedIdx);
                selectedCircleIdx = null;
                document.getElementById('selectedIdx').innerText = 'none';
                drawFromMapping();
            }
        } else {
            // just show popup with color info
            let aci = currentMapping[clickedIdx];
            let rgb = aciColors[aci];
            alert(`ACI ${aci}\nRGB: ${rgb[0]}, ${rgb[1]}, ${rgb[2]}\n${rgbToHex(rgb[0],rgb[1],rgb[2])}`);
        }
    }

    // UI elements
    const swapBtn = document.getElementById('swapModeBtn');
    const resetBtn = document.getElementById('resetMappingBtn');
    const copyBtn = document.getElementById('copyMappingBtn');
    const saveBtn = document.getElementById('saveMappingBtn');
    const copyStatus = document.getElementById('copyStatus');

    swapBtn.addEventListener('click', () => {
        swapMode = !swapMode;
        if(swapMode){
            swapBtn.innerText = 'Swap mode ON';
            swapBtn.classList.add('active');
        } else {
            swapBtn.innerText = 'Swap mode OFF';
            swapBtn.classList.remove('active');
            selectedCircleIdx = null;
            document.getElementById('selectedIdx').innerText = 'none';
            drawFromMapping();
        }
    });

    resetBtn.addEventListener('click', resetToOriginal);

    copyBtn.addEventListener('click', () => {
        let mappingStr = JSON.stringify(currentMapping);
        navigator.clipboard.writeText(mappingStr).then(() => {
            copyStatus.innerText = 'Copied! Paste in chat.';
            setTimeout(() => copyStatus.innerText = '', 2000);
        }).catch(() => copyStatus.innerText = 'Failed to copy');
    });

    // Save mapping as .json file
    saveBtn.addEventListener('click', () => {
        const mappingStr = JSON.stringify(currentMapping, null, 2);
        const blob = new Blob([mappingStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `autorasm_mapping_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        copyStatus.innerText = 'Mapping saved as file!';
        setTimeout(() => copyStatus.innerText = '', 2000);
    });

    canvas.addEventListener('mousemove', handleHover);
    canvas.addEventListener('click', handleCanvasClick);

    function init() {
        canvas.width = 800;
        canvas.height = 800;
        drawFromMapping();
    }
    window.addEventListener('load', init);
</script>
</body>
</html>
